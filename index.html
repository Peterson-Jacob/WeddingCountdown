<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.0/gsap.min.js" defer></script>
    <script src="index.js"></script>
    <script src="change.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Teresa and Jacob Wedding Countdown</title>
    
</head>
<body>
   
    <h1 class="text-center text-5xl md:text-7xl text-white my-6 heading">Teresa & Jacob's Wedding Countdown</h1>
    <div class="text-xl md:text-2xl text-white flex my-6 mx-auto countdown" id="countdown">
        <div class="time-box flex-1">
            <div class="label">Days</div>
            <div class="number" id="days">00</div>
          
        </div>
        <div class="time-box flex-1">
            <div class="label">Hours</div>
            <div class="number" id="hours">00</div>
          
        </div>
        <div class="time-box flex-1">
            <div class="label">Minutes</div>
            <div class="number" id="minutes">00</div>
          
        </div>
        <div class="time-box flex-1">
            <div class="label">Seconds</div>
            <div class="number" id="seconds">00</div>
          
        </div>
      </div>
    <div class="imageDiv my-4 mx-auto " >
        <img src="images/pic1.jpg" alt="JacobandTeresa" id="JacobandTeresa">
    </div>
    <h2 class="text-center text-3xl md:text-4xl text-white my-12 heading">"A cord of three strands is not easily broken" Ecclesiastes 4:12</h2>
    <div class="inviteDiv my-12 mx-auto">
        <img src="images/invite.png" alt="WeddingInvite">
    </div>
</body>
</html>
